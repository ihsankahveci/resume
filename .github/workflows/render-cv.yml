name: Render CV

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.40"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.2"

      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("rmarkdown", "knitr", "yaml", "RefManageR"), repos="https://cran.rstudio.com/")'

      - name: Render CV
        run: quarto render cv.qmd

      - name: Push PDF to website repo
        run: |
          git clone https://x-access-token:${{ secrets.WEBSITE_TOKEN }}@github.com/ihsankahveci/ihsankahveci.com.git website
          cp _output/cv.pdf website/cv/cv.pdf
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv/cv.pdf
          git diff --cached --quiet || git commit -m "chore: update cv.pdf from resume repo"
          git push
